services:
  - type: web
    name: alanschat-backend
    env: node
    rootDir: server
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CLERK_SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
